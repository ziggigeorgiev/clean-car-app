<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CleanCar{% endblock %}</title>
  <style>
    :root {
      --primary: #0EA5A4;
      --primary-dark: #0E7490;
      --text: #0F2C2C;
      --text-light: #5A7A7A;
      --bg: #F7FAFA;
      --card: #ffffff;
      --border: #E4ECEC;
      --success: #28A745;
      --success-bg: #E6F6EA;
      --danger: #D9534F;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }
    header .brand {
      font-weight: 700;
      font-size: 18px;
      color: var(--primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }
    h1 {
      font-size: 26px;
      margin: 0 0 4px;
    }
    h2 {
      font-size: 18px;
      margin: 24px 0 8px;
    }
    p, li { font-size: 15px; color: var(--text); }
    .muted { color: var(--text-light); font-size: 13px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      margin: 12px 0;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      background: var(--primary);
      color: #fff;
    }
    .btn:disabled, .btn.is-done {
      background: #BCC8C8;
      cursor: default;
    }
    .btn.secondary {
      background: var(--card);
      color: var(--primary);
      border-color: var(--primary);
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #EEF3F3;
      color: var(--text-light);
    }
    .badge.completed { background: var(--success-bg); color: var(--success); }
    .badge.in_progress { background: #FFF3CD; color: #856404; }
    .badge.failed { background: #F8D7DA; color: var(--danger); }
    .empty { text-align: center; color: var(--text-light); padding: 30px 10px; }
    ul.steps { list-style: none; padding: 0; margin: 0; }
    ul.steps li { padding: 12px 0; border-bottom: 1px solid var(--border); }
    ul.steps li:last-child { border-bottom: none; }
    .step-title { font-weight: 600; }
    .step-text { color: var(--text-light); font-size: 13px; margin-top: 2px; }
    .step-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    form.inline { display: inline; margin: 0; }
    .flash { padding: 10px 14px; border-radius: 8px; margin: 0 0 16px; }
    .flash.ok { background: var(--success-bg); color: var(--success); }
    .flash.err { background: #F8D7DA; color: var(--danger); }
    a { color: var(--primary); }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">CleanCar</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
